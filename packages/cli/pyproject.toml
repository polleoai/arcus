[project]
name = "arcus-cli"
version = "0.3.0"
description = "arcus CLI binary"
requires-python = ">=3.11"
dependencies = ["arcus-provider-runtime"]

[project.scripts]
arcus = "arcus.cli.main:main"

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-mock>=3.12"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/arcus"]

[tool.uv.sources]
arcus-provider-runtime = { workspace = true }
